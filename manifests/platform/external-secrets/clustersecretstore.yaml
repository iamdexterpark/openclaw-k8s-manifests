apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: cloud-secret-manager
spec:
  provider:
    # Primary profile: Google Secret Manager. Auth is via Workload Identity — no static
    # cloud key sits in the cluster (ADR-0002). This provider block is the ONLY part that
    # changes for a different cloud (swap gcpsm → aws / azurekv / vault); the per-agent
    # ExternalSecret resources are untouched.
    gcpsm:
      projectID: "REPLACE_PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: "REPLACE_REGION"
          clusterName: "REPLACE_CLUSTER"
          serviceAccountRef:
            name: external-secrets
            namespace: platform
# The sops/age sealed values in Git are the *recovery seed* for these secrets, not the
# runtime source. Runtime always resolves live from the secret manager above.
