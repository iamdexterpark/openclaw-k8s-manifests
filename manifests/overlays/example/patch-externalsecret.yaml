apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets
spec:
  data:
    - secretKey: gateway_auth_password
      remoteRef:
        key: agents/example/gateway-auth-password
    - secretKey: model_api_key
      remoteRef:
        key: agents/example/model-api-key
    # This agent is webchat-only, so it gets no channel tokens beyond auth.
    # A Slack/Discord/LINE-bound agent would add its channel secret here, and ONLY
    # here — least privilege per agent (ADR-0002).
