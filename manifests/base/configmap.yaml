apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  labels:
    app.kubernetes.io/name: workload
data:
  # Versioned object-store prefix that holds this agent's durable state (ADR-0003).
  state_prefix: "object-store://edge-agent-state/agents/REPLACE_ME/"

  # The composed runtime config, projected read-only and immutable in the pod (ADR-0006).
  # In a real overlay this is generated from a base + persona fragment by CI; shown inline
  # and trimmed here.
  openclaw.json: |
    {
      "gateway": { "mode": "local", "bind": "loopback", "port": 18789 },
      "session": { "dmScope": "per-channel-peer" },
      "agents": {
        "list": [
          {
            "id": "REPLACE_ME",
            "displayName": "REPLACE_ME",
            "runtime": { "type": "native" },
            "workspaceRoot": "/work/workspace",
            "personaFiles": [
              "persona/AGENTS.md",
              "persona/SOUL.md",
              "persona/IDENTITY.md",
              "persona/USER.md",
              "persona/TOOLS.md",
              "persona/MEMORY.md"
            ],
            "memoryRoot": "/work/workspace/memory",
            "defaultModel": "provider/model-placeholder",
            "heartbeat": { "enabled": false }
          }
        ]
      },
      "channels": {
        "webchat": { "bindings": [ { "agent": "REPLACE_ME" } ] }
      }
    }
