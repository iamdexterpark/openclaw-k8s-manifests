apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-secrets
  labels:
    app.kubernetes.io/name: workload
spec:
  refreshInterval: 1h               # hourly, not per-second — avoid hot-path secret-manager ops
  secretStoreRef:
    name: cloud-secret-manager      # ClusterSecretStore defined in manifests/platform
    kind: ClusterSecretStore
  target:
    name: agent-secrets             # the in-cluster Secret the Deployment consumes
    creationPolicy: Owner
  data:
    - secretKey: gateway_auth_password
      remoteRef:
        key: agents/REPLACE_ME/gateway-auth-password
    - secretKey: model_api_key
      remoteRef:
        key: agents/REPLACE_ME/model-api-key
    # Channel tokens are added per-agent in the overlay (a given agent gets only the
    # channels it's bound to — least privilege). Nothing here is ever committed in
    # plaintext: this references key PATHS in the secret manager; ESO pulls live values
    # at runtime via Workload Identity (ADR-0002).
